services:
  scan2target:
    build:
      context: .
      dockerfile: Dockerfile
    image: scan2target:latest
    container_name: scan2target
    restart: unless-stopped

    volumes:
      - scan2target-data:/data
      - scan2target-logs:/var/log/scan2target
      # USB scanners (uncomment if needed):
      # - /dev/bus/usb:/dev/bus/usb

    environment:
      # ── Paths ────────────────────────────────────────────────────────
      - SCAN2TARGET_DATABASE_PATH=${SCAN2TARGET_DATABASE_PATH:-/data/db/scan2target.db}
      - SCAN2TARGET_LOG_DIR=${SCAN2TARGET_LOG_DIR:-/var/log/scan2target}

      # ── Security (non-secret) ────────────────────────────────────────
      # All runtime settings (require_auth, log_level, intervals, cors_origins)
      # are configurable via the Web UI — no restart needed.

      # ── Secret: choose ONE method ─────────────────────────────────────
      #
      # Option A — Docker Secret (recommended for production):
      #   Create:   mkdir secrets && openssl rand -base64 32 > secrets/scan2target_secret_key
      #   Then uncomment the 'secrets' sections below.
      #
      # Option B — Environment variable:
      #   - SCAN2TARGET_SECRET_KEY=${SCAN2TARGET_SECRET_KEY}
      #
      # Option C — Development (no secret set):
      #   Auto-generates ~/.scan2target/encryption.key — fine for home use.

    # secrets:
    #   - scan2target_secret_key

    # Host network required for mDNS scanner discovery.
    network_mode: host

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  scan2target-data:
    driver: local
  scan2target-logs:
    driver: local

# ── Docker Secrets (Option A) ────────────────────────────────────────────────
# Uncomment both this block AND the 'secrets:' block inside the service.
#
# secrets:
#   scan2target_secret_key:
#     file: ./secrets/scan2target_secret_key
